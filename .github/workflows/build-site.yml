name: Build site

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'CONTENT_EDIT.md'
      - 'Archive 01/**'
      - '.gitignore'
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install everything using the exact same python binary that will run the scripts.
      # Using ${{ env.pythonLocation }} guarantees pip and python point to the same env.
      - name: Install dependencies
        run: |
          "${{ env.pythonLocation }}/bin/python" -m pip install --upgrade pip
          "${{ env.pythonLocation }}/bin/python" -m pip install \
            Pillow \
            pillow-avif-plugin \
            pyyaml \
            markdown \
            markdown-it-py \
            mdit-py-plugins

      # Verify imports using the same interpreter — catches path mismatches before scripts run
      - name: Verify dependencies
        run: |
          "${{ env.pythonLocation }}/bin/python" -c "
          from markdown_it import MarkdownIt
          import PIL, yaml, markdown, mdit_py_plugins
          print('All dependencies OK')
          "

      - name: Convert new gallery images to WebP + AVIF
        run: "${{ env.pythonLocation }}/bin/python" scripts/convert_gallery_images.py

      - name: Sync nav + footer from index.html into all other pages
        run: "${{ env.pythonLocation }}/bin/python" scripts/sync_layout.py

      - name: Build gallery cards from Google Sheet
        env:
          GALLERY_SHEET_CSV_URL: ${{ secrets.GALLERY_SHEET_CSV_URL }}
        run: "${{ env.pythonLocation }}/bin/python" scripts/build_gallery.py

      - name: Build blog posts from markdown
        run: "${{ env.pythonLocation }}/bin/python" scripts/build_post.py

      - name: Rebuild blog index
        run: "${{ env.pythonLocation }}/bin/python" scripts/build_blog.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add gallery.html blog.html blog/ img/gallery/*.webp img/gallery/*.avif 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "build: regenerate site [skip ci]"
          git push

