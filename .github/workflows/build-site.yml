name: Build site

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'CONTENT_EDIT.md'
      - 'Archive 01/**'
      - '.gitignore'
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🔥 Bulletproof dependency install
      - name: Install dependencies
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"

          $PYTHON -m pip install --upgrade pip

          $PYTHON -m pip install --no-cache-dir --force-reinstall \
            Pillow \
            pillow-avif-plugin \
            pyyaml \
            markdown \
            markdown-it-py \
            mdit-py-plugins

          # Debug: confirm install worked
          $PYTHON -m pip list

      # 🔍 Verify markdown_it works BEFORE running scripts
      - name: Verify dependencies
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON -c "from markdown_it import MarkdownIt; print('markdown_it OK')"

      - name: Convert new gallery images to WebP + AVIF
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON scripts/convert_gallery_images.py

      - name: Sync nav + footer
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON scripts/sync_layout.py

      - name: Build gallery
        env:
          GALLERY_SHEET_CSV_URL: ${{ secrets.GALLERY_SHEET_CSV_URL }}
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON scripts/build_gallery.py

      - name: Build blog posts
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON scripts/build_post.py

      - name: Build blog index
        run: |
          PYTHON="${{ env.pythonLocation }}/bin/python"
          $PYTHON scripts/build_blog.py

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add gallery.html blog.html blog/ img/gallery/*.webp img/gallery/*.avif 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "build: regenerate site [skip ci]"
          git push
