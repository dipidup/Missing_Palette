<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Gallery — Missing Palette</title>

    <!-- Tell crawlers this URL is a duplicate of gallery.html -->
    <link rel="canonical" href="https://missingpalette.com/gallery.html">

    <!-- Tell crawlers not to index this redirect stub -->
    <meta name="robots" content="noindex, follow">

    <!-- Instant browser redirect -->
    <meta http-equiv="refresh" content="0; url=https://missingpalette.com/gallery.html">

    <!-- JavaScript fallback (faster on most browsers) -->
    <script>
        window.location.replace("https://missingpalette.com/gallery.html");
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        a {
            color: #d85d24;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <p>
        Redirecting to the gallery&hellip;<br>
        If nothing happens, <a href="https://missingpalette.com/gallery.html">click here</a>.
    </p>
</body>
</html>
